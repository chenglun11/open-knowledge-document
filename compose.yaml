services:
  workbench:
    image: open-knowledge-document:local
    build:
      context: .
      args:
        NODE_IMAGE: ${OKD_NODE_IMAGE:-node:24-alpine}
        PYTHON_IMAGE: ${OKD_PYTHON_IMAGE:-python:3.12-slim}
    ports:
      - "127.0.0.1:${OKD_PORT:-8080}:8000"
    environment:
      OKD_ADMIN_TOKEN: ${OKD_ADMIN_TOKEN:-change-me-local}
      OKD_DATA_DIR: /data
      OKD_SCHEMA_PATH: /app/schemas/open-knowledge-document-v0.1.schema.json
    volumes:
      - okd-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=32m
    restart: unless-stopped

volumes:
  okd-data:
